{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check your email ResearchDoc</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    html, body { min-height: 100%; margin: 0; }
    body {
      background: linear-gradient(rgba(20,20,40,0.45), rgba(20,20,40,0.55)),
                  url('{% static "researchapp/images/bg.jpg" %}') no-repeat center center/cover;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 2rem 1rem;
    }
    .card-box {
      width: 100%; max-width: 460px;
      padding: 36px 32px; border-radius: 20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      color: #fff; text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .icon-circle {
      width: 72px; height: 72px;
      background: rgba(16,185,129,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
    }
    .btn-primary-custom {
      background: #2f5fd4; color: #fff;
      border: none; padding: 10px 22px;
      border-radius: 12px; font-weight: 600;
    }
    .btn-primary-custom:hover { background: #274eb0; color: #fff; }
    a { color: #fff; font-weight: 600; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card-box">
    <div class="icon-circle">
      <i class="bi bi-envelope-check-fill text-white" style="font-size: 2rem;"></i>
    </div>

    <h2 class="fw-bold mb-2">Check your email</h2>
    <p style="opacity: 0.9;">
      We've sent a password-reset link to the email address on file. Click
      the link in that message to choose a new password.
    </p>
    <p class="small mt-3" style="opacity: 0.75;">
      Didn't get an email? Check your spam folder, or
      <a href="{% url 'account_reset_password' %}">try again</a> with a
      different address.
    </p>

    <a href="{% url 'account_login' %}" class="btn btn-primary-custom mt-3">
      <i class="bi bi-arrow-left"></i> Back to login
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
